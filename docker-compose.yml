services:
  hapi-r4-postgresql:
    image: docker.io/hapiproject/hapi:v8.4.0-3
    environment:
      - SPRING_AI_MCP_SERVER_STREAMABLEHTTP_MCPENDPOINT=/mcp/messages
      - SPRING_AI_MCP_SERVER_INSTRUCTIONS=This server provides access to a FHIR RESTful API. 
      - SPRING_AI_MCP_SERVER_VERSION=1.0.0
      - SPRING_AI_MCP_SERVER_NAME=FHIR MCP Server
      - SPRING_AI_MCP_SERVER_ENABLED=true
      - spring.main.allow-bean-definition-overriding=true
      - hapi.fhir.cdshooks.enabled=true
      - hapi.fhir.cr.enabled=true
      - spring.datasource.url=jdbc:postgresql://postgresql-server:5432/postgres
      - spring.datasource.password=password
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_cascading_deletes=true
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      - hapi.fhir.allow_external_references=true
      - spring.datasource.username=postgres
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.bulk_export_enabled=true
      - hapi.fhir.bulk_import_enabled=true
      - hapi.fhir.expunge_enabled=true
    ports:
      - 8081:8080
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 1500M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  postgresql-server:
    image: docker.io/postgres:18
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - 5432:5432
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 32M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      CUSTOM_NAME: "HL7 AI FHIR Bundle"
      WEBUI_NAME: "HL7 AI FHIR Bundle"
      WEBUI_AUTH: False
      OLLAMA_BASE_URL: ${LLM_BASE_URL}
      ENABLE_WEB_SEARCH: True
      WEB_SEARCH_ENGINE: "searxng"
      ENABLE_RAG_WEB_SEARCH: True
      RAG_WEB_SEARCH_ENGINE: "searxng"
      RAG_WEB_SEARCH_RESULT_COUNT: 3
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
      TOOL_SERVER_CONNECTIONS: '[{"type":"openapi","url":"http://host.docker.internal:8000/crawl4ai","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"c4ai","name":"crawl4ai","description":"Fetches web pages and returns markdown, cleaned HTML, screenshots, PDFs, and JS-driven crawl results. Use for browsing, scraping, and turning URLs into structured text."}},{"type":"openapi","url":"http://host.docker.internal:8000/hapi-fhir","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"hapi-fhir","name":"HAPI FHIR","description":"This tool provides direct administrative control over a live HAPI HL7 FHIR server and executes REAL immediate mutations on FHIR resources stored on that server and MUST be used for ALL HL7 FHIR interactions including create read search update and delete; when a user requests any change modification correction replacement or field update to an existing FHIR resource this tool MUST be called to perform the change directly on the server rather than describing how it would be done; all operations have full permission to read and write ANY FHIR resource (e.g. updating Patient.address); NEVER claim lack of access permission or capability when an applicable operation exists and NEVER describe how to perform an action; ALWAYS select and POST the MOST SPECIFIC operation that directly executes the user intent; Reliability+retry rules: treat any tool response containing an error non-2xx HTTP status or an OperationOutcome with severity=error as FAILED and you MUST automatically diagnose the cause and RETRY after fixing the request; if failure is due to a missing referenced resource (e.g. “Resource Organization/1 not found”) you MUST resolve dependencies before retrying by creating the referenced resource if enough information exists OR removing/replacing the invalid reference while preserving user intent then retry; if failure is due to invalid fields wrong structure or unsupported elements you MUST correct the payload and retry; after a successful write you MUST verify success by reading the affected resource and confirming the intended change is present; Available operations: Create-Fhir-Resource Read-Fhir-Resource Update-Fhir-Resource Delete-Fhir-Resource Search-Fhir-Resources."}}]'
      DEFAULT_TOOLS_FUNCTION_CALLING_PROMPT_TEMPLATE: 'Available Tools: {{TOOLS}} Your task is to choose and return the correct tool(s) from the available tools based on the user query and return ONLY a valid JSON object with no prose or explanation; if no tools match or required parameters are missing or ambiguous return {"tool_calls":[]}; if tools match return {"tool_calls":[{"name":"Create-Fhir-Resource","parameters":{...}}]} using the exact operation names Create-Fhir-Resource Read-Fhir-Resource Update-Fhir-Resource Delete-Fhir-Resource Search-Fhir-Resources; EXECUTION RULES: for ANY HL7 FHIR action (create read search update delete) you MUST use the matching HAPI FHIR tool and NEVER describe what you would do; NEVER claim a change occurred unless the corresponding write tool call is present in tool_calls in THIS response; after any successful write you MUST include a verification Read-Fhir-Resource or Search-Fhir-Resources call; if a tool call fails you MUST adjust parameters and retry using tool calls only; for any web content request you MUST use Crawl4AI and crawl returned URLs; output format is strictly {"tool_calls":[{"name":"toolName","parameters":{"key":"value"}}]} or {"tool_calls":[]}.'
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    networks:
      - hapi-fhir_network
  searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_HOSTNAME=searxng:8080/
    ports:
      - "8080:8080"
    volumes:
      - ./searXNG_settings.yml:/etc/searxng/settings.yml:rw
    networks:
      - hapi-fhir_network
  crawl4ai:
    image: unclecode/crawl4ai:0.7
    environment:
      - LLM_PROVIDER=openai/qwen3-coder:30b #recommended for best performance
      - LLM_BASE_URL=${LLM_BASE_URL}/v1
      - OPENAI_API_KEY=ollama
      - LLM_TEMPERATURE=0.7
    ports:
      - 11235:11235
    networks:
      - hapi-fhir_network
  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    ports:
      - "8000:8000"
    volumes:
      - ./mcpo_config.json:/app/config/config.json:ro
    command: mcpo --config /app/config/config.json --hot-reload
    networks:
      - hapi-fhir_network

networks:
  hapi-fhir_network:
    name: hapi-fhir_network
volumes:
  open-webui:
configs: {}

