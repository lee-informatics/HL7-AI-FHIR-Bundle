services:
  hapi-r4-postgresql:
    image: docker.io/hapiproject/hapi:v8.4.0-3
    environment:
      - SPRING_AI_MCP_SERVER_STREAMABLEHTTP_MCPENDPOINT=/mcp/messages
      - SPRING_AI_MCP_SERVER_INSTRUCTIONS=This server provides access to a FHIR RESTful API. 
      - SPRING_AI_MCP_SERVER_VERSION=1.0.0
      - SPRING_AI_MCP_SERVER_NAME=FHIR MCP Server
      - SPRING_AI_MCP_SERVER_ENABLED=true
      - spring.main.allow-bean-definition-overriding=true
      - hapi.fhir.cdshooks.enabled=true
      - hapi.fhir.cr.enabled=true
      - spring.datasource.url=jdbc:postgresql://postgresql-server:5432/postgres
      - spring.datasource.password=password
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_cascading_deletes=true
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      - hapi.fhir.allow_external_references=true
      - spring.datasource.username=postgres
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.bulk_export_enabled=true
      - hapi.fhir.bulk_import_enabled=true
      - hapi.fhir.expunge_enabled=true
    ports:
      - 8081:8080
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 1500M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  postgresql-server:
    image: docker.io/postgres:18
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - 5432:5432
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 32M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_AUTH: "False"
      ENABLE_RAG_WEB_SEARCH: True
      RAG_WEB_SEARCH_ENGINE: "searxng"
      RAG_WEB_SEARCH_RESULT_COUNT: 3
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
    ports:
      - "3080:8080"
    volumes:
      - open-webui:/app/backend/data
    networks:
      - hapi-fhir_network
  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    environment:
      - SEARXNG_HOSTNAME=localhost:8080/
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - hapi-fhir_network
  crawl4ai:
    image: unclecode/crawl4ai:0.7
    environment:
      - LLM_PROVIDER=openai/qwen3:4b
      - LLM_BASE_URL=http://host.docker.internal:11434/v1
      - OPENAI_API_KEY=ollama
      - LLM_TEMPERATURE=0.7
    ports:
      - 11235:11235
    volumes:
      - /dev/shm:/dev/shm  # Chromium performance
    networks:
      - hapi-fhir_network
  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    ports:
      - "8000:8000"
    volumes:
      - ./mcpo_config.json:/app/config/config.json:ro
    command: mcpo --config /app/config/config.json --hot-reload
    networks:
      - hapi-fhir_network

networks:
  hapi-fhir_network:
    name: hapi-fhir_network
volumes:
  open-webui:
  ollama_data:
configs: {}

