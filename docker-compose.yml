services:
  hapi-r4-postgresql:
    image: docker.io/hapiproject/hapi:v8.4.0-3
    environment:
      - SPRING_AI_MCP_SERVER_STREAMABLEHTTP_MCPENDPOINT=/mcp/messages
      - SPRING_AI_MCP_SERVER_INSTRUCTIONS=This server provides access to a FHIR RESTful API. 
      - SPRING_AI_MCP_SERVER_VERSION=1.0.0
      - SPRING_AI_MCP_SERVER_NAME=FHIR MCP Server
      - SPRING_AI_MCP_SERVER_ENABLED=true
      - spring.main.allow-bean-definition-overriding=true
      - hapi.fhir.cdshooks.enabled=true
      - hapi.fhir.cr.enabled=true
      - spring.datasource.url=jdbc:postgresql://postgresql-server:5432/postgres
      - spring.datasource.password=password
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_cascading_deletes=true
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      - hapi.fhir.allow_external_references=true
      - spring.datasource.username=postgres
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.bulk_export_enabled=true
      - hapi.fhir.bulk_import_enabled=true
      - hapi.fhir.expunge_enabled=true
    ports:
      - 8081:8080
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 1500M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  postgresql-server:
    image: docker.io/postgres:18
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - 5432:5432
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 32M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      CUSTOM_NAME: "HL7 AI FHIR Bundle"
      WEBUI_NAME: "HL7 AI FHIR Bundle"
      WEBUI_AUTH: False
      OLLAMA_BASE_URL: ${LLM_BASE_URL}
      ENABLE_WEB_SEARCH: True
      WEB_SEARCH_ENGINE: "searxng"
      ENABLE_RAG_WEB_SEARCH: True
      RAG_WEB_SEARCH_ENGINE: "searxng"
      RAG_WEB_SEARCH_RESULT_COUNT: 3
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
      TOOL_SERVER_CONNECTIONS: '[{"type":"openapi","url":"http://host.docker.internal:8000/crawl4ai","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"c4ai","name":"crawl4ai","description":"Web crawling tool."}},{"type":"openapi","url":"http://host.docker.internal:8000/hapi-fhir","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"hapi-fhir","name":"HAPI FHIR","description":"FHIR server admin API."}},{"type":"openapi","url":"http://host.docker.internal:8000/terminology-server","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"terminology-server","name":"terminology-server","description":"Terminology FHIR Server."}}]'
      DEFAULT_TOOLS_FUNCTION_CALLING_PROMPT_TEMPLATE: 'Available Tools: {{TOOLS}} Return ONLY a valid JSON object of the form {"tool_calls":[]} OR {"tool_calls":[{"name":"...","parameters":{...}}, ...]}; no prose and no extra keys. ROUTER INVARIANTS: (1) If the user request requires any FHIR server interaction, you MUST return tool_calls using MCP FHIR tools (never explain). (2) Never claim inability to access FHIR servers; tool access is assumed available. (3) Never invent IDs, identifiers, codes, server names, or resource content; use only user-provided values. (4) If any required parameter is missing or ambiguous and cannot be safely inferred, return {"tool_calls":[]}. TWO-SERVER ROUTING: A) HAPI clinical server (mutations + clinical CRUD/search): use Create-Fhir-Resource, Read-Fhir-Resource, Update-Fhir-Resource, Delete-Fhir-Resource, Search-Fhir-Resources, Patch-Fhir-Resource, Conditional-Patch-Fhir-Resource, Conditional-Update-Fhir-Resource, Create-Fhir-Transaction, Call-Cds-Hook for Patient/Encounter/Observation/etc or any create/update/patch/delete/transaction. B) Terminology server (read/search only): use get_capabilities, search, read, get_user only for terminology lookups/search; DO NOT use terminology create/update/delete even if present. WRITE VERIFICATION (HAPI ONLY): if any HAPI write tool is included (Create/Update/Patch/Delete/Conditional*/Transaction), append an immediate verification call (prefer Read-Fhir-Resource if an id will be known, else Search-Fhir-Resources). If no tools match, return {"tool_calls":[]}.'
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    networks:
      - hapi-fhir_network
  searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_HOSTNAME=searxng:8080/
    ports:
      - "8080:8080"
    volumes:
      - ./searXNG_settings.yml:/etc/searxng/settings.yml:rw
    networks:
      - hapi-fhir_network
  crawl4ai:
    image: unclecode/crawl4ai:0.8
    ports:
      - 11235:11235
    networks:
      - hapi-fhir_network
  fhir-mcp-server:
    image: docker.io/wso2/fhir-mcp-server:latest
    environment:
      FHIR_SERVER_BASE_URL: https://tx.fhir.org/r4/
      FHIR_MCP_HOST: 0.0.0.0
      FHIR_MCP_PORT: "8001"
      FHIR_MCP_REQUEST_TIMEOUT: "30"
      FHIR_SERVER_DISABLE_AUTHORIZATION: True
    ports:
      - "8001:8001"
    networks:
      - hapi-fhir_network
  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    ports:
      - "8000:8000"
    volumes:
      - ./mcpo_config.json:/app/config/config.json:ro
    command: mcpo --config /app/config/config.json --hot-reload
    networks:
      - hapi-fhir_network

networks:
  hapi-fhir_network:
    name: hapi-fhir_network
volumes:
  open-webui:
configs: {}

