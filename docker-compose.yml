services:
  hapi-r4-postgresql:
    image: docker.io/hapiproject/hapi:v8.8.0-1
    environment:
      - SPRING_AI_MCP_SERVER_STREAMABLEHTTP_MCPENDPOINT=/mcp/messages
      - SPRING_AI_MCP_SERVER_INSTRUCTIONS=This server provides access to a FHIR RESTful API. 
      - SPRING_AI_MCP_SERVER_VERSION=1.0.0
      - SPRING_AI_MCP_SERVER_NAME=FHIR MCP Server
      - SPRING_AI_MCP_SERVER_ENABLED=true
      - spring.main.allow-bean-definition-overriding=true
      - hapi.fhir.cdshooks.enabled=true
      - hapi.fhir.cr.enabled=true
      - spring.datasource.url=jdbc:postgresql://postgresql-server:5432/postgres
      - spring.datasource.password=password
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_cascading_deletes=true
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect
      - hapi.fhir.allow_external_references=true
      - spring.datasource.username=postgres
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.bulk_export_enabled=true
      - hapi.fhir.bulk_import_enabled=true
      - hapi.fhir.expunge_enabled=true
    ports:
      - 8081:8080
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 1500M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  postgresql-server:
    image: docker.io/postgres:18
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - 5432:5432
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits: {}
        reservations:
          memory: 32M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    configs: []
    networks:
      - hapi-fhir_network
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      CUSTOM_NAME: "HL7 AI FHIR Bundle"
      WEBUI_NAME: "HL7 AI FHIR Bundle"
      WEBUI_AUTH: False
      OLLAMA_BASE_URL: ${LLM_BASE_URL}
      ENABLE_WEB_SEARCH: True
      WEB_SEARCH_ENGINE: "searxng"
      ENABLE_RAG_WEB_SEARCH: True
      RAG_WEB_SEARCH_ENGINE: "searxng"
      RAG_WEB_SEARCH_RESULT_COUNT: 3
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
      TOOL_SERVER_CONNECTIONS: '[{"type":"openapi","url":"http://host.docker.internal:8000/crawl4ai","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"c4ai","name":"Deep Research","description":"Web scraping tool."}},{"type":"openapi","url":"http://host.docker.internal:8000/hapi-fhir","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"hapi-fhir","name":"HAPI FHIR Server","description":"HAPI FHIR Server API."}},{"type":"openapi","url":"http://host.docker.internal:8000/terminology-server","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"terminology-server","name":"Terminology Server","description":"Terminology FHIR Server."}}]'
      DEFAULT_TOOLS_FUNCTION_CALLING_PROMPT_TEMPLATE: 'Available Tools: {{TOOLS}} IDENTITY: You are a deterministic FHIR tool router. You select tools and parameters. You do not explain, narrate, or converse. OUTPUT CONTRACT: Return ONLY one valid JSON object. No prose, no markdown, no extra keys. With calls: {"tool_calls":[{"name":"...","parameters":{...}}, ...]} Without calls: {"tool_calls":[]} SCOPE: This prompt is responsible ONLY for selecting the correct tool(s) and populating parameters from user input. It is NOT responsible for: explaining FHIR concepts, answering questions without tools, interpreting clinical meaning, validating FHIR correctness, or formatting human-readable output. SERVER CLASSIFICATION (apply in order, stop at first match): TERMINOLOGY SERVER — MATCH WHEN the request is EXCLUSIVELY about: looking up codes, code systems, value sets, concept maps, naming systems; searching or reading terminology resources (CodeSystem, ValueSet, ConceptMap, NamingSystem); validating codes or translating between code systems; checking server terminology capabilities. Tools ALLOWED: get_capabilities, search, read, get_user. Tools FORBIDDEN: Any create, update, patch, delete, transaction tool even if present in terminology namespace. HAPI FHIR SERVER — MATCH WHEN the request involves ANY of: clinical resources (Patient, Encounter, Observation, Condition, Procedure, MedicationRequest, AllergyIntolerance, DiagnosticReport, Immunization, CarePlan, or ANY non-terminology FHIR resource); any mutation (create, update, patch, delete, transaction regardless of resource type); CDS Hooks invocation; searching or reading clinical/administrative resources. Tools ALLOWED: ALL. DISAMBIGUATION RULE: If a request mentions BOTH clinical data AND terminology concepts (e.g. find all Observations using LOINC code X), route to HAPI FHIR for the data operation. The terminology code is a parameter value, not a terminology server operation. DECISION HIERARCHY (resolve conflicts in this order): 1. Never fabricate IDs, identifiers, codes, resource content, server names — use ONLY values present in user input. 2. Server classification accuracy > parameter completeness > call count minimization. 3. If a required parameter is missing AND cannot be unambiguously derived from user input, return {"tool_calls":[]}. 4. If the request is ambiguous between servers, prefer HAPI FHIR when any clinical resource is referenced. WRITE VERIFICATION: After any HAPI mutation tool (Create/Update/Patch/Delete/Conditional-Patch/Conditional-Update/Create-Fhir-Transaction), append a verification call: if resource id is known or will be returned use Read-Fhir-Resource, otherwise use Search-Fhir-Resources with identifying parameters from the write. FAILURE BEHAVIOR: Request outside FHIR domain returns {"tool_calls":[]}. Missing required parameter with no safe inference returns {"tool_calls":[]}. Cannot determine correct server returns {"tool_calls":[]}. Never claim inability to access servers — tool access is always available. Never explain why you returned empty — just return empty. PROHIBITED: No natural language in output. No invented parameter values. No terminology server tools for clinical resource operations. No HAPI FHIR tools for pure terminology lookups. No tool calls when zero tools match the request.'
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    networks:
      - hapi-fhir_network
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searXNG_settings.yml:/etc/searxng/settings.yml:rw
      - ./limiter.toml:/etc/searxng/limiter.toml:rw
    networks:
      - hapi-fhir_network
  crawl4ai:
    image: unclecode/crawl4ai:0.8
    ports:
      - 11235:11235
    networks:
      - hapi-fhir_network
  fhir-mcp-server:
    image: docker.io/wso2/fhir-mcp-server:latest
    environment:
      FHIR_SERVER_BASE_URL: https://tx.fhir.org/r4/
      FHIR_MCP_HOST: 0.0.0.0
      FHIR_MCP_PORT: "8001"
      FHIR_MCP_REQUEST_TIMEOUT: "30"
      FHIR_SERVER_DISABLE_AUTHORIZATION: True
    ports:
      - "8001:8001"
    networks:
      - hapi-fhir_network
  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    ports:
      - "8000:8000"
    volumes:
      - ./mcpo_config.json:/app/config/config.json:ro
    command: mcpo --config /app/config/config.json --hot-reload
    networks:
      - hapi-fhir_network
  fhir-controller:
    image: docker.io/p3000/fhir-controller:latest
    ports:
      - 4204:80
    networks:
      - hapi-fhir_network
networks:
  hapi-fhir_network:
    name: hapi-fhir_network
volumes:
  open-webui:
configs: {}

